<div class="container mt-5">

    <button
        class="btn btn-link text-dark mb-4 ps-0"
        onclick="navegarHacia('vehiculos')"
    >

        <i class="bi bi-arrow-left me-2"></i>

        Volver a vehículos

    </button>

    <div class="card border-0 shadow-sm rounded-4">

        <div class="card-body p-5">

            <div class="d-flex justify-content-between align-items-start mb-5">

                <div>

                    <h2
                        id="vehiculoTitulo"
                        class="fw-bold mb-2"
                    ></h2>

                    <p
                        id="vehiculoMatricula"
                        class="text-muted mb-0"
                    ></p>

                </div>

                <span
                    id="badgeCombustible"
                    class="badge rounded-pill px-4 py-2"
                ></span>

            </div>

            <div class="row g-5">

                <div class="col-md-6">

                    <h5 class="fw-bold mb-4">
                        Información general
                    </h5>

                    <div class="mb-3">

                        <strong>ID vehículo:</strong>

                        <span id="vehiculoId"></span>

                    </div>

                    <div class="mb-3">

                        <strong>Motor:</strong>

                        <span id="vehiculoMotor"></span>

                    </div>

                    <div class="mb-3">

                        <strong>Cliente:</strong>

                        <span id="vehiculoCliente"></span>

                    </div>

                </div>

                <div class="col-md-6">

                    <h5 class="fw-bold mb-4">
                        Acciones
                    </h5>

                    <div class="d-flex flex-wrap gap-3">

                        <button
                            class="btn btn-primary"
                            id="btnEditarVehiculo"
                        >

                            <i class="bi bi-pencil me-2"></i>

                            Editar

                        </button>

                        <button
                            class="btn btn-success"
                            id="btnNuevaReparacion"
                        >

                            <i class="bi bi-tools me-2"></i>

                            Reparación

                        </button>

                        <button
                            class="btn btn-dark"
                            id="btnNuevoLog"
                        >

                            <i class="bi bi-journal-text me-2"></i>

                            Incidencia

                        </button>

                    </div>

                </div>

            </div>

            <hr class="my-5">

            <h4 class="fw-bold mb-4">

                Historial reparaciones

            </h4>

            <div
                id="historialReparaciones"
                class="d-flex flex-column gap-3"
            ></div>

        </div>

    </div>

</div>
