<div class="container mt-5">

    <h1 class="mb-4">Dashboard</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card shadow-sm border-0 rounded-4 bg-primary text-white h-100">
                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="text-uppercase opacity-75 mb-1">Clientes</h6>
                            <h2 id="totalClientes" class="fw-bold mb-0">0</h2>
                        </div>

                        <div>
                            <i class="bi bi-person fs-1 opacity-75"></i>
                        </div>

                    </div>

                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0 rounded-4 bg-info text-white h-100">
                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="text-uppercase opacity-75 mb-1">Vehículos</h6>
                            <h2 id="totalVehiculos" class="fw-bold mb-0">0</h2>
                        </div>

                        <div>
                            <i class="bi bi-car-front-fill fs-1 opacity-75"></i>
                        </div>

                    </div>

                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0 rounded-4 bg-success text-white h-100">
                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="text-uppercase opacity-75 mb-1">Logs</h6>
                            <h2 id="totalLogs" class="fw-bold mb-0">0</h2>
                        </div>

                        <div>
                            <i class="bi bi-gear fs-1 opacity-75"></i>
                        </div>

                    </div>

                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0 rounded-4 bg-danger text-white h-100">
                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h6 class="text-uppercase opacity-75 mb-1">Críticos</h6>
                            <h2 id="logsCriticos" class="fw-bold mb-0">0</h2>
                        </div>

                        <div>
                            <i class="bi bi-exclamation-triangle fs-1 opacity-75"></i>
                        </div>

                    </div>

                </div>
            </div>
        </div>

    </div>

    <div class="row mt-5">

        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body">

                    <h4 class="mb-3">
                        <i class="bi bi-car-front me-2"></i>
                        Últimos Vehículos
                    </h4>

                    <ul id="ultimosVehiculos" class="list-group list-group-flush"></ul>

                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body">

                    <h4 class="mb-3">
                        <i class="bi bi-gear me-2"></i>
                        Últimos Logs
                    </h4>

                    <ul id="ultimosLogs" class="list-group list-group-flush"></ul>

                </div>
            </div>
        </div>

    </div>




</div>
