<div class="container mt-5">

    <div class="mb-4">

        <h1>Nueva Incidencia</h1>

        <p class="text-muted">
            Registra una incidencia o diagnóstico del vehículo
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-12 col-lg-8">

            <div class="card shadow-sm border-0 rounded-4">

                <div class="card-body p-4">

                    <form id="formLog" class="needs-validation" novalidate>

                        <!-- DESCRIPCIÓN -->
                        <div class="mb-4">

                            <label for="descripcion" class="form-label fw-semibold">
                                Descripción
                            </label>

                            <textarea id="descripcion" class="form-control" rows="5"
                                placeholder="Ej: Ruido extraño en el motor al acelerar..." required
                                minlength="10"></textarea>

                            <div class="invalid-feedback">
                                Introduce una descripción válida (mínimo 10 caracteres)
                            </div>

                        </div>

                        <!-- PRIORIDAD + ESTADO -->
                        <div class="row g-3">

                            <!-- PRIORIDAD -->
                            <div class="col-md-6">

                                <label for="prioridad" class="form-label fw-semibold">
                                    Prioridad
                                </label>

                                <select id="prioridad" class="form-select" required>

                                    <option value="">
                                        Selecciona prioridad
                                    </option>

                                    <option value="Alta">
                                        Alta
                                    </option>

                                    <option value="Media">
                                        Media
                                    </option>

                                    <option value="Baja">
                                        Baja
                                    </option>

                                </select>

                                <div class="invalid-feedback">
                                    Selecciona una prioridad
                                </div>

                            </div>

                            <!-- ESTADO -->
                            <div class="col-md-6">

                                <label for="estado" class="form-label fw-semibold">
                                    Estado
                                </label>

                                <select id="estado" class="form-select" required>

                                    <option value="">
                                        Selecciona estado
                                    </option>

                                    <option value="Abierto">
                                        Abierto
                                    </option>

                                    <option value="En Proceso">
                                        En Proceso
                                    </option>

                                    <option value="Cerrado">
                                        Cerrado
                                    </option>

                                </select>

                                <div class="invalid-feedback">
                                    Selecciona un estado
                                </div>

                            </div>

                        </div>

                        <!-- BOTONES -->
                        <div class="mt-4 d-flex gap-2">

                            <button type="submit" class="btn btn-dark px-4">

                                <i class="bi bi-journal-plus me-2"></i>

                                Guardar incidencia

                            </button>

                            <button type="button" class="btn btn-outline-secondary" onclick="navegarHacia('vehiculos')">
                                <i class="bi bi-x-circle me-2"></i>
                                Cancelar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
