<div class="container mt-5">

    <div class="mb-4">

        <h1>Nueva Incidencia</h1>

        <p class="text-muted">
            Registra una incidencia o diagnóstico del vehículo
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-12 col-lg-8">

            <div class="card shadow-sm border-0 rounded-4">

                <div class="card-body p-4">

                    <form id="formLog">

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Descripción
                            </label>

                            <textarea
                                id="descripcion"
                                class="form-control"
                                rows="5"
                                placeholder="Ej: Ruido extraño en el motor al acelerar..."
                                required
                            ></textarea>

                        </div>

                        <div class="row g-3">

                            <div class="col-md-6">

                                <label class="form-label fw-semibold">
                                    Prioridad
                                </label>

                                <select
                                    id="prioridad"
                                    class="form-select"
                                >

                                    <option value="Alta">
                                        Alta
                                    </option>

                                    <option value="Media">
                                        Media
                                    </option>

                                    <option value="Baja">
                                        Baja
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label fw-semibold">
                                    Estado
                                </label>

                                <select
                                    id="estado"
                                    class="form-select"
                                >

                                    <option value="Abierto">
                                        Abierto
                                    </option>

                                    <option value="En Proceso">
                                        En Proceso
                                    </option>

                                    <option value="Cerrado">
                                        Cerrado
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="mt-4 d-flex gap-2">

                            <button class="btn btn-dark">

                                <i class="bi bi-journal-plus me-2"></i>

                                Guardar incidencia

                            </button>

                            <button
                                type="button"
                                class="btn btn-outline-secondary"
                                onclick="navegarHacia('vehiculos')"
                            >
                                Cancelar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
