<div class="container mt-5">

    <div class="mb-4">
        <h1 id="nombreCliente">Cliente</h1>
        <p class="text-muted">Información detallada</p>
    </div>

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-6">
                    <h5>Nombre</h5>
                    <p id="detalleNombre"></p>
                </div>

                <div class="col-md-6">
                    <h5>Teléfono</h5>
                    <p id="detalleTelefono"></p>
                </div>

                <div class="col-md-6">
                    <h5>Email</h5>
                    <p id="detalleEmail"></p>
                </div>

                <div class="col-md-6">
                    <h5>Fecha nacimiento</h5>
                    <p id="detalleFecha"></p>
                </div>

            </div>

        </div>

    </div>

    <!-- Vehículos -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>Vehículos</h3>

    </div>

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body">

            <table class="table align-middle">

                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Combustible</th>
                    </tr>
                </thead>

                <tbody id="tablaVehiculos">
                </tbody>

            </table>

        </div>

    </div>

</div>
