<div class="container mt-5">

    <div class="mb-4">

        <h1>Nueva Reparación</h1>

        <p class="text-muted">
            Asigna una reparación al vehículo
        </p>

    </div>

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-4">

            <form id="formReparacion">

                <div class="row g-3">

                    <!-- Tipo -->

                    <div class="col-md-6">

                        <label class="form-label">
                            Tipo reparación
                        </label>

                        <input
                            type="text"
                            id="rep_tipo"
                            class="form-control"
                            placeholder="Ej: Cambio embrague"
                        >

                    </div>

                    <!-- Duración -->

                    <div class="col-md-3">

                        <label class="form-label">
                            Horas trabajo
                        </label>

                        <input
                            type="number"
                            id="rep_duracion"
                            class="form-control"
                            min="1"
                            placeholder="Ej: 3"
                        >

                    </div>

                    <div class="col-md-3">

                        <label class="form-label">
                            Precio hora
                        </label>

                        <input
                            type="number"
                            id="rep_precio_hora"
                            class="form-control"
                            min="1"
                            placeholder="Ej: 60"
                        >

                    </div>

                    <!-- Garantía -->

                    <div class="col-md-3">

                        <label class="form-label">
                            Garantía
                        </label>

                        <select
                            id="rep_garantia"
                            class="form-select"
                        >

                            <option value="6">
                                6 meses
                            </option>

                            <option value="12">
                                12 meses
                            </option>

                            <option value="24">
                                24 meses
                            </option>

                        </select>

                    </div>

                    <!-- Fecha -->

                    <div class="col-md-6">

                        <label class="form-label">
                            Fecha
                        </label>

                        <input
                            type="date"
                            id="rep_fecha"
                            class="form-control"
                        >

                    </div>

                </div>

                <!-- PIEZAS -->

                <hr class="my-4">

                <h5 class="mb-3">

                    <i class="bi bi-box-seam me-2"></i>
                    Piezas utilizadas

                </h5>

                <div class="row g-3 align-items-end">

                    <!-- Select piezas -->

                    <div class="col-md-6">

                        <label class="form-label">
                            Pieza
                        </label>

                        <select
                            id="piezaSelect"
                            class="form-select"
                        >

                            <option value="">
                                Seleccionar pieza
                            </option>

                        </select>

                    </div>

                    <!-- Cantidad -->

                    <div class="col-md-3">

                        <label class="form-label">
                            Cantidad
                        </label>

                        <input
                            type="number"
                            id="cantidadPieza"
                            class="form-control"
                            min="1"
                            value="1"
                        >

                    </div>

                    <!-- Botón -->

                    <div class="col-md-3">

                        <button
                            type="button"
                            class="btn btn-outline-primary w-100"
                            id="btnAgregarPieza"
                        >

                            <i class="bi bi-plus-lg me-2"></i>
                            Añadir

                        </button>

                    </div>

                </div>

                <!-- Tabla piezas -->

                <div class="table-responsive mt-4">

                    <table class="table align-middle">

                        <thead>

                            <tr>

                                <th>Pieza</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Total</th>
                                <th></th>

                            </tr>

                        </thead>

                        <tbody id="tablaPiezas">

                            <!-- JS -->

                        </tbody>

                    </table>

                </div>

                <!-- RESUMEN -->

                <div class="row justify-content-end mt-4">

                    <div class="col-md-4">

                        <div class="card bg-light border-0">

                            <div class="card-body">

                                <div class="d-flex justify-content-between">

                                    <span>Mano obra</span>

                                    <strong id="totalManoObra">
                                        0€
                                    </strong>

                                </div>

                                <div class="d-flex justify-content-between mt-2">

                                    <span>Piezas</span>

                                    <strong id="totalPiezas">
                                        0€
                                    </strong>

                                </div>

                                <hr>

                                <div class="d-flex justify-content-between">

                                    <h5>Total</h5>

                                    <h5 id="totalReparacion">
                                        0€
                                    </h5>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- BOTONES -->

                <div class="mt-4 d-flex gap-2">

                    <button class="btn btn-success">

                        <i class="bi bi-tools me-2"></i>
                        Guardar reparación

                    </button>

                    <button
                        type="button"
                        class="btn btn-outline-secondary"
                        onclick="navegarHacia('vehiculos')"
                    >
                        Cancelar
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
