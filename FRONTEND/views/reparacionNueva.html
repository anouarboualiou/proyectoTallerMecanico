<div class="container mt-5">

    <div class="mb-4">

        <h1>Nueva Reparación</h1>

        <p class="text-muted">
            Asigna una reparación al vehículo
        </p>

    </div>

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-4">

            <form id="formReparacion" class="needs-validation" novalidate>

                <div class="row g-3">

                    <!-- Tipo -->

                    <div class="col-md-6">

                        <label for="rep_tipo" class="form-label fw-semibold">
                            Tipo reparación
                        </label>

                        <input type="text" id="rep_tipo" class="form-control" placeholder="Ej: Cambio embrague" required
                            minlength="3">

                        <div class="invalid-feedback">
                            Introduce un tipo de reparación válido
                        </div>

                    </div>

                    <!-- Duración -->

                    <div class="col-md-3">

                        <label for="rep_duracion" class="form-label fw-semibold">
                            Horas trabajo
                        </label>

                        <input type="number" id="rep_duracion" class="form-control" min="1" placeholder="Ej: 3"
                            required>

                        <div class="invalid-feedback">
                            Introduce las horas de trabajo
                        </div>

                    </div>

                    <!-- Precio hora -->

                    <div class="col-md-3">

                        <label for="rep_precio_hora" class="form-label fw-semibold">
                            Precio hora
                        </label>

                        <input type="number" id="rep_precio_hora" class="form-control" min="1" placeholder="Ej: 60"
                            required>

                        <div class="invalid-feedback">
                            Introduce un precio por hora válido
                        </div>

                    </div>

                    <!-- Garantía -->

                    <div class="col-md-3">

                        <label for="rep_garantia" class="form-label fw-semibold">
                            Garantía
                        </label>

                        <select id="rep_garantia" class="form-select" required>

                            <option value="">
                                Seleccionar garantía
                            </option>

                            <option value="6">
                                6 meses
                            </option>

                            <option value="12">
                                12 meses
                            </option>

                            <option value="24">
                                24 meses
                            </option>

                        </select>

                        <div class="invalid-feedback">
                            Selecciona una garantía
                        </div>

                    </div>

                    <!-- Fecha -->

                    <div class="col-md-6">

                        <label for="rep_fecha" class="form-label fw-semibold">
                            Fecha
                        </label>

                        <input type="date" id="rep_fecha" class="form-control" required>

                        <div class="invalid-feedback">
                            Selecciona una fecha válida
                        </div>

                    </div>

                </div>

                <!-- PIEZAS -->

                <hr class="my-4">

                <h5 class="mb-3">

                    <i class="bi bi-box-seam me-2"></i>
                    Piezas utilizadas

                </h5>

                <div class="row g-3 align-items-end">

                    <!-- Select piezas -->

                    <div class="col-md-6">

                        <label for="piezaSelect" class="form-label fw-semibold">
                            Pieza
                        </label>

                        <select id="piezaSelect" class="form-select">

                            <option value="">
                                Seleccionar pieza
                            </option>

                        </select>

                    </div>

                    <!-- Cantidad -->

                    <div class="col-md-3">

                        <label for="cantidadPieza" class="form-label fw-semibold">
                            Cantidad
                        </label>

                        <input type="number" id="cantidadPieza" class="form-control" min="1" value="1">

                    </div>

                    <!-- Botón -->

                    <div class="col-md-3">

                        <button type="button" class="btn btn-outline-primary w-100" id="btnAgregarPieza">

                            <i class="bi bi-plus-lg me-2"></i>
                            Añadir

                        </button>

                    </div>

                </div>

                <!-- Tabla piezas -->

                <div class="table-responsive mt-4">

                    <table class="table align-middle">

                        <thead class="table-light">

                            <tr>

                                <th>Pieza</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Total</th>
                                <th></th>

                            </tr>

                        </thead>

                        <tbody id="tablaPiezas">

                            <!-- JS -->

                        </tbody>

                    </table>

                </div>

                <!-- RESUMEN -->

                <div class="row justify-content-end mt-4">

                    <div class="col-md-4">

                        <div class="card bg-light border-0 shadow-sm rounded-4">

                            <div class="card-body">

                                <div class="d-flex justify-content-between">

                                    <span>Mano obra</span>

                                    <strong id="totalManoObra">
                                        0€
                                    </strong>

                                </div>

                                <div class="d-flex justify-content-between mt-2">

                                    <span>Piezas</span>

                                    <strong id="totalPiezas">
                                        0€
                                    </strong>

                                </div>

                                <hr>

                                <div class="d-flex justify-content-between">

                                    <h5 class="mb-0">
                                        Total
                                    </h5>

                                    <h5 id="totalReparacion" class="mb-0 text-success">
                                        0€
                                    </h5>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- BOTONES -->

                <div class="mt-4 d-flex gap-2">

                    <button type="submit" class="btn btn-success px-4">

                        <i class="bi bi-tools me-2"></i>
                        Guardar reparación

                    </button>

                    <button type="button" class="btn btn-outline-secondary" onclick="navegarHacia('vehiculos')">

                        <i class="bi bi-x-circle me-2"></i>
                        Cancelar

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
