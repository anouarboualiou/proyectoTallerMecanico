<div class="container mt-5">

    <h1 class="mb-4">Editar Cliente</h1>

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body">

            <form id="formEditarCliente">

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" id="editNombre" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Apellidos</label>
                    <input type="text" id="editApellidos" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" id="editFecha" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="text" id="editEmail" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Teléfono</label>
                    <input type="text" id="editTelefono" class="form-control">
                </div>

                <button class="btn btn-primary">
                    Guardar Cambios
                </button>

            </form>

        </div>

    </div>

</div>
